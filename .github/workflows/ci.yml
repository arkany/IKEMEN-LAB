name: CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
      - 'claude/**'

jobs:
  build-and-test:
    name: Build
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-deriveddata-${{ hashFiles('**/*.pbxproj', '**/*.swift') }}
          restore-keys: |
            ${{ runner.os }}-deriveddata-

      # Build-only: the IKEMEN Lab Tests target is app-hosted (TEST_HOST set),
      # and `xcodebuild test` can't reliably launch the host app on GitHub's
      # macOS runners ("Test runner never began executing tests after launching",
      # exit 65). Building still validates that the app and the test bundle
      # compile cleanly. Tests can run locally in Xcode in the meantime; once
      # the test target is restructured as a logic-only bundle (no TEST_HOST),
      # this can switch back to `xcodebuild test`.
      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "IKEMEN Lab.xcodeproj" \
            -scheme "IKEMEN Lab" \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=
